name: "mochabun Demo"
description: "AI 기반 기술면접 준비 서비스 데모"

viewport:
  width: 1280
  height: 800

effects:
  cursor:
    enabled: true
    size: 18
    speed: "fast"
    clickEffect: true
    clickColor: "rgba(59, 130, 246, 0.3)"
    trail: true
    trailLength: 5
    highlight: true
    highlightRadius: 30
  background:
    type: gradient
    value: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)"
    padding: 40
    borderRadius: 12
    shadow: true
  deviceFrame:
    enabled: true
    type: browser
    darkMode: true
  zoom:
    enabled: true
    intensity: subtle
    autoZoom:
      followCursor: false
      transitionDuration: 300
      padding: 200
  speedRamp:
    enabled: true
    idleSpeed: 2.0
    actionSpeed: 0.9
  keystroke:
    enabled: true
    showTyping: true
    position: bottom-center
    fontSize: 14
    fadeAfter: 1200

output:
  format: mp4
  width: 1280
  height: 800
  fps: 30
  preset: archive

steps:
  # ===== Auto Login (demo mode) =====
  - name: "Auto login for demo"
    actions:
      - action: navigate
        url: "http://localhost:3000/api/demo-auth?next=/%3Fdemo%3Dtrue"
        waitUntil: "networkidle"
      - action: wait
        duration: 1000
    captureDelay: 200
    holdDuration: 600

  # ===== Homepage =====
  - name: "Wait for homepage"
    actions:
      - action: waitForSelector
        selector: "textarea[aria-label='면접 유형 검색']"
        state: visible
        timeout: 15000
      - action: wait
        duration: 300
    captureDelay: 100
    holdDuration: 500

  # ===== Interview Category: Click Popover Trigger =====
  - name: "Open interview category popover"
    actions:
      - action: click
        selector: "button:has-text('면접 범주')"
        timeout: 5000
        delay: 200
    captureDelay: 200
    holdDuration: 400

  # ===== Interview Category: Select System Design =====
  - name: "Select system design from popover"
    actions:
      - action: click
        selector: "button:has-text('시스템 설계')"
        timeout: 5000
        delay: 200
    captureDelay: 200
    holdDuration: 500

  # ===== Type Interview Query =====
  - name: "Type interview query"
    actions:
      - action: click
        selector: "textarea[aria-label='면접 유형 검색']"
        timeout: 5000
      - action: type
        selector: "textarea[aria-label='면접 유형 검색']"
        text: "대용량 트래픽 처리 면접 준비해줘."
        delay: 40
    captureDelay: 100
    holdDuration: 500

  # ===== Submit =====
  - name: "Submit query"
    actions:
      - action: click
        selector: "button[type='submit']"
        timeout: 5000
    captureDelay: 100
    holdDuration: 300

  # ===== Search Results Page =====
  - name: "Wait for questions to appear"
    actions:
      - action: waitForURL
        url: "**/search**"
        timeout: 15000
      - action: waitForSelector
        selector: ".divide-y"
        state: visible
        timeout: 10000
      - action: wait
        duration: 400
    captureDelay: 200
    holdDuration: 1000

  - name: "Scroll to see all questions"
    actions:
      - action: scroll
        y: 300
        smooth: true
    captureDelay: 200
    holdDuration: 800

  # ===== 찜하기 on search results =====
  - name: "Favorite first question"
    actions:
      - action: click
        selector: "button[aria-label='찜하기']"
        timeout: 5000
        delay: 300
    captureDelay: 200
    holdDuration: 600

  # ===== Scroll to start button =====
  - name: "Scroll to start button"
    actions:
      - action: waitForFunction
        expression: "document.querySelector('button.bg-gold')?.scrollIntoView({behavior:'smooth',block:'center'}) || true"
        timeout: 10000
      - action: wait
        duration: 600
    captureDelay: 200
    holdDuration: 400

  - name: "Click start interview"
    actions:
      - action: click
        selector: "button.bg-gold"
        timeout: 5000
        delay: 200
    captureDelay: 100
    holdDuration: 300

  # ===== Interview Page =====
  - name: "Wait for interview page"
    actions:
      - action: waitForURL
        url: "**/interview**"
        timeout: 30000
      - action: waitForSelector
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        state: visible
        timeout: 30000
    captureDelay: 300
    holdDuration: 800

  - name: "Write answer"
    actions:
      - action: click
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        timeout: 5000
      - action: type
        selector: "textarea[placeholder='답변을 입력해주세요...']"
        text: "로드 밸런서로 트래픽 분산, Redis 캐시로 DB 부하 감소, CDN으로 정적 리소스 엣지 제공, Kafka 메시지 큐로 비동기 처리를 구현합니다."
        delay: 25
    captureDelay: 100
    holdDuration: 600

  # ===== 찜하기 on interview page =====
  - name: "Favorite current question"
    actions:
      - action: click
        selector: "button[aria-label='찜하기']"
        timeout: 5000
        delay: 300
    captureDelay: 200
    holdDuration: 500

  # ===== Show Hint =====
  - name: "Show hint"
    actions:
      - action: click
        selector: "button[aria-controls='hint-content']"
        timeout: 5000
        delay: 200
    captureDelay: 200
    holdDuration: 1200
    transition: fade

  # ===== Close hint & scroll up =====
  - name: "Close hint"
    actions:
      - action: click
        selector: "button[aria-controls='hint-content']"
        timeout: 5000
        delay: 300
    captureDelay: 200
    holdDuration: 400

  - name: "Scroll to top of interview"
    actions:
      - action: scroll
        y: -400
        smooth: true
      - action: wait
        duration: 400
    captureDelay: 200
    holdDuration: 800
